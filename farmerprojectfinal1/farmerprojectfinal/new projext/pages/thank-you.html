<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - FarmEmpower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="../styles.css">
    <style>
        .success-animation {
            animation: successScale 1s ease-in-out;
        }
        
        @keyframes successScale {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .checkmark {
            animation: checkmarkDraw 1s ease-in-out forwards;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }
        
        @keyframes checkmarkDraw {
            to { stroke-dashoffset: 0; }
        }
        
        .message-fade {
            animation: messageFade 1s ease-in-out forwards;
            opacity: 0;
        }
        
        @keyframes messageFade {
            to { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 text-center">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8" data-aos="zoom-in">
            <!-- Success Icon -->
            <div class="w-24 h-24 mx-auto mb-6 success-animation">
                <svg class="w-full h-full" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#4CAF50" opacity="0.2"/>
                    <path class="checkmark" fill="none" stroke="#4CAF50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" d="M30 50 L45 65 L70 35"/>
                </svg>
            </div>
            
            <!-- Success Message -->
            <div class="message-fade" style="animation-delay: 0.5s;">
                <h1 class="text-3xl font-bold text-gray-800 mb-4">Message Sent Successfully!</h1>
                <p class="text-gray-600 mb-8">Thank you for contacting us. We'll get back to you as soon as possible.</p>
                
                <!-- Additional Information -->
                <div class="bg-green-50 rounded-lg p-4 mb-8">
                    <p class="text-green-700 mb-2">What's Next?</p>
                    <ul class="text-left text-gray-600 space-y-2">
                        <li class="flex items-center">
                            <i class="fas fa-check-circle text-green-500 mr-2"></i>
                            We'll review your message within 24 hours
                        </li>
                        <li class="flex items-center">
                            <i class="fas fa-check-circle text-green-500 mr-2"></i>
                            You'll receive a confirmation email
                        </li>
                        <li class="flex items-center">
                            <i class="fas fa-check-circle text-green-500 mr-2"></i>
                            Our team will contact you soon
                        </li>
                    </ul>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <a href="../index.html" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition duration-300 flex items-center justify-center">
                        <i class="fas fa-home mr-2"></i>
                        Back to Home
                    </a>
                    <a href="../pages/blog/blogpage.html" class="bg-gray-100 text-gray-800 px-6 py-3 rounded-lg hover:bg-gray-200 transition duration-300 flex items-center justify-center">
                        <i class="fas fa-blog mr-2"></i>
                        Visit Our Blog
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>
</body>
</html>
